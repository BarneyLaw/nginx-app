name: build-and-update-config

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/nginx-app
          SHA=${GITHUB_SHA::7}
          docker build -t $IMAGE:$SHA -t $IMAGE:latest .
          docker push $IMAGE:$SHA
          docker push $IMAGE:latest
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homelab-config
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: config

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Bump image tag
        working-directory: config/apps/nginx
        run: |
          kustomize edit set image ${{ steps.build.outputs.image }}=${{ steps.build.outputs.image }}:${{ steps.build.outputs.sha }}

      - name: Commit and push tag bump
        working-directory: config
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/nginx/kustomization.yaml
          git commit -m "deploy: nginx ${{ steps.build.outputs.sha }}" || echo "no changes"
          git push